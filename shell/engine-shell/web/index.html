<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shader Forge Code Bridge</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171b20;
      --panel: #20262e;
      --panel-2: #272f38;
      --border: #343c47;
      --text: #d9dee5;
      --muted: #97a0ac;
      --accent: #f0a341;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #14181d 0%, #171c22 100%);
      padding: 16px;
    }

    .bridge-shell {
      display: grid;
      gap: 12px;
      min-height: calc(100vh - 32px);
    }

    .bridge-bar,
    .bridge-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--panel) 0%, #1b2128 100%);
    }

    .bridge-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
    }

    .bridge-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .bridge-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .bridge-panel {
      display: grid;
      align-content: start;
      gap: 14px;
      padding: 18px;
    }

    .bridge-panel h1 {
      margin: 0;
      font-size: 22px;
    }

    .bridge-panel p,
    .bridge-list li {
      color: var(--muted);
      line-height: 1.55;
    }

    .bridge-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
    }

    .bridge-code {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      background: var(--panel-2);
      font-family: "JetBrains Mono", "Cascadia Code", monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="bridge-shell" id="code-bridge-root"></div>
  <script type="module" src="./js/code-bridge.js"></script>
</body>
</html>
