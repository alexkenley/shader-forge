<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shader Forge Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Auth Modal -->
  <div id="auth-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Shader Forge</h2>
      <p>Enter your authentication token to continue.</p>
      <form id="auth-form">
        <input type="password" id="auth-token-input" placeholder="Bearer token" autocomplete="off">
        <button id="auth-submit" class="btn btn-primary" type="submit">Connect</button>
        <p id="auth-error" class="error-text" style="display:none;"></p>
      </form>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" style="display:none;">
    <header class="header">
      <div class="header-left">
        <h1 class="logo">&#x1F6E1; Shader Forge</h1>
      </div>
      <div class="header-right">
        <span id="header-clock" class="header-clock"></span>
        <span id="connection-indicator" class="indicator disconnected">Disconnected</span>
        <button id="killswitch-btn" class="btn-killswitch" title="Shut down all services">&#x26A1; Killswitch</button>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar" id="app-sidebar">
        <a href="#/" class="nav-item active" data-page="dashboard" title="Dashboard">
          <span class="nav-icon">&#x1F6E1;</span><span class="nav-label"> Dashboard</span>
        </a>
        <a href="#/security" class="nav-item" data-page="security" title="Security">
          <span class="nav-icon">&#x2694;</span><span class="nav-label"> Security</span>
        </a>
        <a href="#/network" class="nav-item" data-page="network" title="Network">
          <span class="nav-icon">&#x1F310;</span><span class="nav-label"> Network</span>
        </a>
        <a href="#/cloud" class="nav-item" data-page="cloud" title="Cloud">
          <span class="nav-icon">&#9729;</span><span class="nav-label"> Cloud</span>
        </a>
        <a href="#/automations" class="nav-item" data-page="automations" title="Automations">
          <span class="nav-icon">&#x1F501;</span><span class="nav-label"> Automations</span>
        </a>
        <a href="#/code" class="nav-item" data-page="code" title="Code">
          <span class="nav-icon">&#x1F4BB;</span><span class="nav-label"> Code</span>
        </a>
        <a href="#/config" class="nav-item" data-page="config" title="Configuration">
          <span class="nav-icon">&#x2699;</span><span class="nav-label"> Configuration</span>
        </a>
        <a href="#/reference" class="nav-item" data-page="reference" title="Reference Guide">
          <span class="nav-icon">&#x1F4D6;</span><span class="nav-label"> Reference Guide</span>
        </a>
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" title="Collapse sidebar">&#x276E;</button>
      </nav>

      <main id="content" class="content">
        <!-- Pages render here -->
      </main>

      <aside id="chat-panel" class="chat-panel">
        <!-- Persistent Chat renders here -->
      </aside>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
